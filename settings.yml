highlight_color:
  type: string
  default: "#26d670"
  description: "Background and glow color for the currently spoken word."

highlight_text_color:
  type: string
  default: "#000000"
  description: "Text color for the currently spoken word."

seek_preroll_seconds:
  type: float
  default: 0.08
  min: 0
  max: 2
  description: "How many seconds before the clicked word playback should begin. Increase this if clicked words start clipped."

highlight_offset_seconds:
  type: float
  default: 0.08
  min: -1
  max: 1
  description: "Timing correction for highlighting. Positive values make highlighting happen earlier; negative values make it happen later."

floating_player_enabled:
  type: bool
  default: false
  description: "Keep the AudioSync player visible near the top of the screen after readers scroll past it, while its post remains in view."

debug_logging:
  type: bool
  default: false
  description: "Log matching and fetch details to the browser console."
